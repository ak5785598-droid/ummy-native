<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="300" fill="url(#bg)" rx="16"/>
  
  <!-- Glow effect -->
  <circle cx="100" cy="120" r="60" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Star icon -->
  <g transform="translate(100, 110)" filter="url(#shadow)">
    <path d="M0,-30 L8,-10 L30,-10 L12,4 L18,26 L0,14 L-18,26 L-12,4 L-30,-10 L-8,-10 Z" 
          fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#fef3c7" opacity="0.8"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="60" cy="80" r="3" fill="#fbbf24" opacity="0.9"/>
  <circle cx="140" cy="90" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="70" cy="150" r="2.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="130" cy="140" r="2" fill="#fbbf24" opacity="0.6"/>
  
  <!-- Text -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="1">WEEKLY STAR</text>
  
  <!-- Subtitle -->
  <text x="100" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        fill="#fbbf24" text-anchor="middle">1:1,000,000</text>
  
  <!-- Decorative line -->
  <line x1="60" y1="220" x2="140" y2="220" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
</svg>